title: "[Announcement] "
body:
  - type: input
    id: recipients
    attributes:
      label: Recipients
      description: >-
        Name at least one @handle. Every named recipient will owe its own
        awareness receipt (a 👀 reaction) by default — the [ACK] title
        prefix still works but is no longer required to trigger it. Add
        the `fyi` label instead if this is a pure broadcast where no
        receipt is expected from anyone.
      placeholder: "@handle, @handle"
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: Content
      description: >-
        The announcement itself. For a source update, include the source
        URL and an immutable revision, commit, or content hash.
    validations:
      required: true
